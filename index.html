<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>기출문제 보관함</title>
<style>
  :root{
    --navy:#1F2A44;
    --navy-light:#2E3C5E;
    --paper:#F7F5F1;
    --paper-dim:#EEEAE2;
    --ink:#2B2E36;
    --ink-dim:#6B7280;
    --amber:#C97A2E;
    --amber-dim:#E8C9A4;
    --line:#D8D3C6;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--sans);}
  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 60px;
  }
  .wrap{width:100%;max-width:480px;}

  header{margin-bottom:22px;}
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--amber);
    margin:0 0 6px;
  }
  h1{
    font-size:24px;
    line-height:1.3;
    margin:0 0 4px;
    color:var(--navy);
    letter-spacing:-0.01em;
  }
  .sub{font-size:13px;color:var(--ink-dim);margin:0;}

  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
  }

  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  label{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-size:12px;
    font-weight:600;
    color:var(--navy);
    margin-bottom:7px;
  }
  label .count{
    font-family:var(--mono);
    font-size:11px;
    font-weight:400;
    color:var(--ink-dim);
  }
  select{
    width:100%;
    padding:13px 14px;
    font-size:15px;
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:9px;
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236B7280'/></svg>");
    background-repeat:no-repeat;
    background-position:right 14px center;
  }
  select:disabled{color:var(--ink-dim);opacity:.6;}
  select:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}

  .result{
    border:1px dashed var(--line);
    border-radius:14px;
    padding:20px;
    text-align:center;
  }
  .result.ready{border-style:solid;border-color:var(--navy);background:var(--navy);}
  .result p{margin:0 0 14px;font-size:13px;color:var(--ink-dim);}
  .result.ready p{color:var(--amber-dim);}

  .btn-row{display:flex;gap:8px;flex-wrap:nowrap;}
  .btn{
    flex:1;
    min-width:0;
    display:block;
    padding:13px 6px;
    border-radius:9px;
    font-size:13px;
    font-weight:600;
    text-decoration:none;
    text-align:center;
    transition:transform .08s ease;
    white-space:normal;
    line-height:1.25;
  }
  .btn:active{transform:scale(.97);}
  .btn-problem{background:var(--amber);color:#fff;}
  .btn-solution{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.35);}
  .btn.disabled{background:var(--paper-dim);color:var(--ink-dim);pointer-events:none;}

  .qrow{display:flex;gap:8px;}
  .qrow select{
    width:auto;
    flex:0 0 76px;
    padding:13px 8px;
    font-size:14px;
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:9px;
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236B7280'/></svg>");
    background-repeat:no-repeat;
    background-position:right 10px center;
  }
  .qrow input{
    flex:1;
    min-width:0;
    padding:13px 14px;
    font-size:15px;
    font-family:var(--sans);
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:9px;
  }
  .qrow input:disabled{opacity:.6;}
  .qrow input:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}
  .qrow .btn{flex:1.3;min-width:130px;background:#cc0000;color:#fff;}
  .qrow .btn.disabled{background:var(--paper-dim);color:var(--ink-dim);}

  footer{
    margin-top:22px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    text-align:center;
    line-height:1.7;
  }
  footer b{color:var(--navy);}

  /* Gemini 패널 */
  .api-row{display:flex;gap:8px;margin-bottom:12px;}
  .api-row input{
    flex:1;min-width:0;
    padding:11px 14px;font-size:14px;font-family:var(--sans);
    color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:9px;
    letter-spacing:.04em;
  }
  .api-row input:focus-visible{outline:2px solid var(--amber);outline-offset:1px;}
  .api-save{
    padding:11px 16px;border-radius:9px;border:none;cursor:pointer;
    background:var(--navy);color:#fff;font-size:13px;font-weight:600;
    white-space:nowrap;
  }
  .api-save.ok{background:#2d7a3a;}

  .cam-area{
    border:2px dashed var(--line);border-radius:12px;
    padding:22px 16px;text-align:center;cursor:pointer;
    transition:border-color .15s;position:relative;
  }
  .cam-area:hover{border-color:var(--amber);}
  .cam-area input[type=file]{
    position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
  }
  .cam-icon{font-size:32px;margin-bottom:6px;}
  .cam-label{font-size:13px;color:var(--ink-dim);}

  .scan-preview{
    width:100%;border-radius:10px;margin-bottom:12px;
    display:none;max-height:220px;object-fit:contain;
  }
  .scan-btn{
    width:100%;padding:13px;border-radius:9px;border:none;cursor:pointer;
    background:var(--amber);color:#fff;font-size:14px;font-weight:700;
  }
  .scan-btn:disabled{background:var(--paper-dim);color:var(--ink-dim);cursor:default;}
  .scan-status{
    margin-top:10px;font-size:12px;text-align:center;
    color:var(--ink-dim);min-height:18px;
  }
  .scan-status.err{color:#c0392b;}
  .scan-status.ok{color:#2d7a3a;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">Personal Archive</p>
    <h1>기출문제 보관함</h1>
    <p class="sub">학년 · 연도 · 월을 고르면 저장된 문제·해설을 엽니다.</p>
  </header>

  <div class="panel">
    <div class="field">
      <label>학년 <span class="count" id="gradeCount"></span></label>
      <select id="grade">
        <option value="">선택하세요</option>
      </select>
    </div>
    <div class="field">
      <label>연도 <span class="count" id="yearCount"></span></label>
      <select id="year" disabled>
        <option value="">학년을 먼저 선택하세요</option>
      </select>
    </div>
    <div class="field">
      <label>월</label>
      <select id="month" disabled>
        <option value="">연도를 먼저 선택하세요</option>
      </select>
    </div>
  </div>

  <div class="result" id="result">
    <p id="resultMsg">학년 / 연도 / 월을 모두 선택하면 여기에서 열 수 있어요.</p>
    <div class="btn-row" id="btnRow"></div>
  </div>

  <div class="panel">
    <div class="field">
      <label>문제 번호 <span class="count">유튜브 해설 영상 검색</span></label>
      <div class="qrow">
        <select id="trackSel" style="display:none;">
          <option value="가형">가형</option>
          <option value="나형">나형</option>
        </select>
        <input type="number" id="qNum" min="1" placeholder="예: 28" disabled>
        <a class="btn disabled" id="btnYoutube" target="_blank" rel="noopener">영상 검색</a>
      </div>
    </div>
  </div>

  <!-- Gemini 문제 인식 패널 -->
  <div class="panel">
    <div class="field">
      <label>문제 사진으로 자동 인식 <span class="count">Gemini Vision</span></label>
      <img id="scanPreview" class="scan-preview" alt="미리보기">
      <div class="cam-area" id="camArea">
        <input type="file" accept="image/*" capture="environment" id="imgInput" onchange="onImageSelected(event)">
        <div class="cam-icon">📷</div>
        <div class="cam-label">탭하여 촬영 또는 사진 선택</div>
      </div>
      <button class="scan-btn" id="scanBtn" disabled onclick="runScan()">문제 인식하기</button>
      <div class="scan-status" id="scanStatus"></div>
    </div>
  </div>

  <footer>
    저장된 회차: <b id="totalCount">0</b>개 · 마지막 갱신 시 이 줄은 무시하셔도 됩니다<br>
    파일 추가 방법은 함께 받은 안내문을 참고하세요.
  </footer>

</div>

<script>

   폴더 구조: files / 학년 / 연도 / 월_문제.pdf, 월_해설.pdf
   예) files/고1/2024/03_문제.pdf
       files/고1/2024/03_해설.pdf

   [수능]
   월 대신 "수능"이라는 값을 쓰되, 홀수형/짝수형 구분 없이 통합 파일 하나로 사용합니다.
   예) files/고3/2024/수능_문제.pdf
       files/고3/2024/수능_해설.pdf
   DATA: { grade: "고3", year: 2024, month: "수능" }
   → 일반 월과 똑같이 "문제 PDF / 해설 PDF" 버튼 2개로 표시됩니다.

   [가형 / 나형 - 문이과 구분 시기]
   고2는 2016~2019년, 고3은 2016~2020년(수능 포함)이 가형/나형으로 나뉩니다.
   이 기간의 회차는 DATA에 track: "gana" 를 추가하면, 일반 모의고사든 수능이든

   예) files/고3/2018/06_가형_문제.pdf

function pdfPath(grade, year, month, type){
  return `files/${grade}/${year}/${month}_${type}.pdf`;
}

const GRADES = ["고1", "고2", "고3"];
const YT_CHANNEL = "새로이종남T";

const gradeSel = document.getElementById('grade');
const yearSel  = document.getElementById('year');
const monthSel = document.getElementById('month');
const result   = document.getElementById('result');
const resultMsg= document.getElementById('resultMsg');
const btnRow   = document.getElementById('btnRow');
const qNum     = document.getElementById('qNum');
const btnYoutube = document.getElementById('btnYoutube');
const trackSel = document.getElementById('trackSel');

let currentEntry = null; // { grade, year, month }

function renderButtons(buttons){
  btnRow.innerHTML = '';
  buttons.forEach(b=>{
    const a = document.createElement('a');
    a.className = 'btn ' + (b.primary ? 'btn-problem' : 'btn-solution');
    a.target = '_blank';
    a.rel = 'noopener';
    a.href = b.href;
    a.textContent = b.label;
    btnRow.appendChild(a);
  });
}

function renderDisabledButtons(labels){
  btnRow.innerHTML = '';
  labels.forEach(label=>{
    const a = document.createElement('a');
    a.className = 'btn disabled';
    a.textContent = label;
    btnRow.appendChild(a);
  });
}

function updateYoutubeLink(){
  const num = qNum.value.trim();
  if(!currentEntry || !num){
    btnYoutube.classList.add('disabled');
    btnYoutube.removeAttribute('href');
    return;
  }
  const { grade, year, month, track } = currentEntry;
  const monthPart = month === '수능' ? '수능' : `${parseInt(month)}월`;
  const typePart = track === 'gana' ? ` ${trackSel.value}` : '';
  const query = `${YT_CHANNEL} ${grade} ${year}년 ${monthPart}${typePart} ${num}번`;
  btnYoutube.href = 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query);
  btnYoutube.classList.remove('disabled');
}

qNum.addEventListener('input', updateYoutubeLink);
trackSel.addEventListener('change', updateYoutubeLink);

function resetYoutubeField(){
  currentEntry = null;
  qNum.value = '';
  qNum.disabled = true;
  trackSel.style.display = 'none';
  trackSel.value = '가형';
  btnYoutube.classList.add('disabled');
  btnYoutube.removeAttribute('href');
}

function fillSelect(sel, items, placeholder){
  sel.innerHTML = '';
  const opt0 = document.createElement('option');
  opt0.value = '';
  opt0.textContent = items.length ? placeholder : '데이터 없음';
  sel.appendChild(opt0);
  items.forEach(v=>{
    const o = document.createElement('option');
    o.value = v;
    o.textContent = typeof v === 'string' && v.match(/^\d{2}$/) ? `${v}월` : v;
    sel.appendChild(o);
  });
  sel.disabled = items.length === 0;
}

function init(){
  fillSelect(gradeSel, GRADES, '선택하세요');
  document.getElementById('totalCount').textContent = DATA.length;
  GRADES.forEach(g=>{
    // no-op, just keeping structure obvious
  });
  updateGradeCounts();
  resetDown('year');
  resetDown('month');
  clearResult();
}

function updateGradeCounts(){
  // not displaying per-grade count by default; left simple on purpose.
}

function resetDown(level){
  if(level === 'year'){
    fillSelect(yearSel, [], '학년을 먼저 선택하세요');
    yearSel.innerHTML = '<option value="">학년을 먼저 선택하세요</option>';
    yearSel.disabled = true;
  }
  if(level === 'month'){
    monthSel.innerHTML = '<option value="">연도를 먼저 선택하세요</option>';
    monthSel.disabled = true;
  }
}

function clearResult(){
  result.classList.remove('ready');
  resultMsg.textContent = '학년 / 연도 / 월을 모두 선택하면 여기에서 열 수 있어요.';
  renderDisabledButtons(['문제 PDF', '해설 PDF']);
  resetYoutubeField();
}

gradeSel.addEventListener('change', ()=>{
  const g = gradeSel.value;
  resetDown('month');
  clearResult();
  if(!g){ resetDown('year'); return; }
  const years = [...new Set(DATA.filter(d=>d.grade===g).map(d=>d.year))].sort((a,b)=>b-a);
  fillSelect(yearSel, years, '연도를 선택하세요');
});

yearSel.addEventListener('change', ()=>{
  const g = gradeSel.value, y = yearSel.value;
  clearResult();
  if(!y){ resetDown('month'); return; }
  const months = [...new Set(DATA.filter(d=>d.grade===g && String(d.year)===String(y)).map(d=>d.month))].sort();
  fillSelect(monthSel, months, '월을 선택하세요');
});

monthSel.addEventListener('change', ()=>{
  const g = gradeSel.value, y = yearSel.value, m = monthSel.value;
  if(!m){ clearResult(); return; }
  const entry = DATA.find(d=>d.grade===g && String(d.year)===String(y) && d.month===m);
  if(!entry){ clearResult(); return; }
  result.classList.add('ready');

  currentEntry = { grade: g, year: y, month: m };
  qNum.disabled = false;
  updateYoutubeLink();

  // track이 "gana"면 가형/나형 3버튼, 그 외(수능 포함)는 일반 문제/해설 2버튼
  const track = entry.track || null;
  const label = m === '수능' ? `${y}년 수능` : `${y}년 ${parseInt(m)}월`;
  resultMsg.textContent = `${g} · ${label}`;

  currentEntry = { grade: g, year: y, month: m, track };
  qNum.disabled = false;
  trackSel.style.display = track === 'gana' ? '' : 'none';
  updateYoutubeLink();

  if(track === 'gana'){
    renderButtons([
      { label: '가형 문제', href: pdfPath(g, y, m, '가형_문제'), primary: true },
      { label: '나형 문제', href: pdfPath(g, y, m, '나형_문제'), primary: true },
      { label: '가형 해설', href: pdfPath(g, y, m, '가형_해설'), primary: false },
      { label: '나형 해설', href: pdfPath(g, y, m, '나형_해설'), primary: false },
    ]);
  } else {
    renderButtons([
      { label: '문제 PDF', href: pdfPath(g, y, m, '문제'), primary: true },
      { label: '해설 PDF', href: pdfPath(g, y, m, '해설'), primary: false },
    ]);
  }
});

init();

/* ============================================================
   Gemini Vision — 문제 사진 자동 인식
   ▼ 여기에 본인의 Gemini API 키를 붙여넣으세요 ▼
   ============================================================ */
const GEMINI_API_KEY = "AQ.Ab8RN6La96ptJIaapIVQWSgwbtLikogwPoOwzNDY2CrN41WNog";   // ← 이 부분만 바꾸면 됩니다

let selectedImageB64 = null;
let selectedImageMime = 'image/jpeg';

function onImageSelected(e){
  const file = e.target.files[0];
  if(!file) return;
  selectedImageMime = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    selectedImageB64 = dataUrl.split(',')[1];
    const preview = document.getElementById('scanPreview');
    preview.src = dataUrl;
    preview.style.display = 'block';
    document.getElementById('camArea').style.display = 'none';
    document.getElementById('scanBtn').disabled = false;
    setStatus('사진이 선택됐어요. "문제 인식하기"를 눌러주세요.');
  };
  reader.readAsDataURL(file);
}

function setStatus(msg, type=''){
  const el = document.getElementById('scanStatus');
  el.textContent = msg;
  el.className = 'scan-status' + (type ? ' ' + type : '');
}

async function runScan(){
  if(!GEMINI_API_KEY || GEMINI_API_KEY === '여기에_API_키_입력'){
    setStatus('index.html 파일에 API 키를 입력해주세요.', 'err'); return;
  }
  if(!selectedImageB64){
    setStatus('사진을 먼저 선택해주세요.', 'err'); return;
  }

  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = '분석 중...';
  setStatus('Gemini가 문제를 분석하고 있어요...');

  const prompt = `이 이미지는 한국 고등학교 수학 시험 문제입니다.
이미지에서 아래 정보를 찾아 JSON으로만 답하세요. 다른 텍스트는 절대 쓰지 마세요.

{"grade":"고1","year":2024,"month":"06","number":28}

- grade: "고1", "고2", "고3" 중 하나
- year: 연도 숫자 (예: 2024)
- month: 두 자리 월 문자열 (예: "03","06","09","11") 또는 수능이면 "수능"
- number: 이 문제의 번호 (숫자, 모르면 null)

확인이 불가능한 필드는 null로 쓰세요. JSON만 반환하세요.`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type: selectedImageMime, data: selectedImageB64}},
            {text: prompt}
          ]}],
          generationConfig:{temperature:0, maxOutputTokens:256}
        })
      }
    );
    const data = await res.json();

    if(data.error){
      setStatus('API 오류: ' + data.error.message, 'err');
      btn.disabled = false; btn.textContent = '문제 인식하기'; return;
    }

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const jsonStr = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(jsonStr);

    const { grade, year, month, number } = parsed;
    const matchEntry = DATA.find(d =>
      d.grade === grade &&
      String(d.year) === String(year) &&
      d.month === month
    );

    if(!matchEntry){
      setStatus(`인식 결과: ${grade} ${year}년 ${month} — 보관함에 없는 회차예요.`, 'err');
      btn.disabled = false; btn.textContent = '다시 인식';
      return;
    }

    // 드롭다운 자동 선택
    gradeSel.value = grade;
    gradeSel.dispatchEvent(new Event('change'));
    await new Promise(r => setTimeout(r, 50));

    yearSel.value = String(year);
    yearSel.dispatchEvent(new Event('change'));
    await new Promise(r => setTimeout(r, 50));

    monthSel.value = month;
    monthSel.dispatchEvent(new Event('change'));

    // 문제 번호 자동 입력
    if(number){
      qNum.value = number;
      qNum.dispatchEvent(new Event('input'));
    }

    const monthLabel = month === '수능' ? '수능' : `${parseInt(month)}월`;
    setStatus(`✓ ${grade} ${year}년 ${monthLabel}${number ? ' ' + number + '번' : ''} 인식 완료!`, 'ok');

    // 사진 초기화 (다음 촬영 준비)
    btn.textContent = '다시 인식';
    btn.disabled = false;

  } catch(err){
    setStatus('분석 실패: ' + err.message, 'err');
    btn.disabled = false; btn.textContent = '다시 인식';
  }
}

// 다시 찍기: 미리보기 클릭 시 초기화
document.getElementById('scanPreview').addEventListener('click', ()=>{
  document.getElementById('scanPreview').style.display = 'none';
  document.getElementById('camArea').style.display = '';
  document.getElementById('imgInput').value = '';
  document.getElementById('scanBtn').disabled = true;
  document.getElementById('scanBtn').textContent = '문제 인식하기';
  selectedImageB64 = null;
  setStatus('');
});
</script>
